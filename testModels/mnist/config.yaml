seed: 42
device: auto

paths:
  outputs_dir: outputs
  data_root: data

dataset:
  batch_size: 64

model:
  input_dim: 784
  hidden_dim: 128
  num_classes: 10

checkpoints:
  - weights_path: testModels/mnist/checkpoints/ckpt_0.pt
    optimizer_state_path: testModels/mnist/checkpoints/optim_0.pt
    learning_rate: 0.01

ghost:
  projection_dim: 1280
  projection_type: sjlt
  projection_seed: 42

index:
  output_path: faiss_index
  metadata_path: faiss_metadata.json

query:
  index_path: faiss_index
  metadata_path: faiss_metadata.json
  top_k: 20
